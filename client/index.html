    <!-- ============================================================
         TWITTER / X CARD
         summary_large_image: 大きな横長プレビューカードを表示。
         X は og:* を fallback として読むが、twitter:* を明示すると確実。
    ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="日本の石油備蓄・ガソリン価格ダッシュボード" />
    <meta name="twitter:description" content="資源エネルギー庁の公開データに基づく日本のガソリン価格・石油備蓄状況をリアルタイムで可視化。価格推移・国家備蓄・民間備蓄を一目でチェック。" />

    <meta name="twitter:domain" content="japanogdash-n4vme7nz.manus.space" />

    <!-- ============================================================
         LINE (og:* で自動対応。追加で line-og:* は不要)
         LINE プレビューは og:image を 1200×630 にトリミングして表示するが
         2752×1536 でも中央クロップで問題なく表示される。
    ============================================================ -->

    <!-- ============================================================
         FACEBOOK 追加設定
         fb:app_id は任意だが設定するとインサイトが使えるようになる。

    <!-- <meta property="fb:app_id" content="YOUR_FB_APP_ID" /> -->

         DISCORD / SLACK
